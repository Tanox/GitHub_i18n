name: GitHub i18n CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  # 代码质量检查
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 安装依赖
      run: npm ci

    - name: 运行 ESLint
      run: npm run lint

    - name: 检查代码格式
      run: npm run format:check

  # 构建项目
  build:
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 安装依赖
      run: npm ci

    - name: 构建项目
      run: npm run build

    - name: 验证构建产物
      run: npm run validate

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: GitHub_i18n.user.js
        path: build/GitHub_i18n.user.js
        retention-days: 30

  # 安全扫描
  security:
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 安装依赖
      run: npm ci

    - name: 运行安全审计
      run: npm audit --audit-level=moderate || true

  # 发布到 GitHub Releases
  release:
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.event_name == 'release'

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 安装依赖
      run: npm ci

    - name: 下载构建产物
      uses: actions/download-artifact@v4
      with:
        name: GitHub_i18n.user.js
        path: build/

    - name: 创建发布包
      run: |
        mkdir -p release
        cp -r build/* release/
        cp README.md LICENSE release/
        cd release
        zip -r ../GitHub_i18n_${{ github.event.release.tag_name }}.zip .

    - name: 上传发布资产
      uses: softprops/action-gh-release@v1
      with:
        files: GitHub_i18n_${{ github.event.release.tag_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 通知
  notify:
    runs-on: ubuntu-latest
    needs: [build, security]
    if: always()

    steps:
    - name: 通知构建结果
      run: |
        if [ "${{ needs.build.result }}" == "success" ] && [ "${{ needs.security.result }}" == "success" ]; then
          echo "✅ 构建和安全扫描全部通过"
        else
          echo "❌ 构建或安全扫描失败"
          exit 1
        fi
