schema: spec-driven

# Project context
context: |
  技术栈: JavaScript, Node.js
  使用语义化提交
  领域: GitHub中文本地化插件
  规范文档: docs/ 目录存放正式规范文档（原型设计、架构文档、开发指南等）
  当前版本: 1.9.20

# Per-artifact rules
rules:
  proposal:
    - 保持提案在500字以内
    - 始终包含'非目标'部分

# Specification directories
specDirectories:
  - path: ../docs
    purpose: 存放正式规范文档和原型设计
    description: |
      包含项目原型设计、架构文档、开发指南、代码风格等正式规范文档。
      主要文档：
      - prototype.md: 原型设计文档（脚本原型图、UI设计、流程图）
      - architecture.md: 系统架构文档
      - development.md: 开发流程指南
      - coding-style.md: 代码风格规范
  - path: ../openspec
    purpose: OpenSpec规范和项目配置
    description: |
      包含OpenSpec相关配置、项目规范和变更管理。
