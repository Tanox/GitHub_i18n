        }
        
        /* ========================================
           词典表格组件
           ======================================== */
        .dictionary-table {
            width: 100%;
        }
        
        .dictionary-entry {
            display: grid;
            grid-template-columns: 1fr auto 1fr auto;
            gap: var(--space-4);
            padding: var(--space-4) var(--space-5);
            background: var(--color-bg-secondary);
            border-radius: var(--radius-xl);
            margin-bottom: var(--space-3);
            border: 1px solid var(--color-border-default);
            align-items: center;
            transition: all var(--duration-fast) var(--ease-out);
        }
        
        .dictionary-entry:hover {
            border-color: var(--color-primary-300);
            background: var(--color-primary-50);
        }
        
        .dictionary-original {
            font-size: var(--font-size-base);
            color: var(--color-text-primary);
            font-weight: var(--font-weight-medium);
        }
        
        .dictionary-arrow {
            color: var(--color-text-tertiary);
            font-size: 20px;
        }
        
        .dictionary-translated {
            font-size: var(--font-size-base);
            color: var(--color-primary-600);
        }
        
        .dictionary-actions {
            display: flex;
            gap: var(--space-2);
        }
        
        .dictionary-action-btn {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-lg);
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-text-secondary);
            transition: all var(--duration-fast) var(--ease-out);
        }
        
        .dictionary-action-btn:hover {
            background: var(--color-gray-100);
            color: var(--color-text-primary);
        }
        
        .dictionary-action-btn.delete:hover {
            background: var(--color-error-50);
            color: var(--color-error-600);
        }
        
        /* ========================================
           响应式移动端
           ======================================== */
        @media (max-width: 768px) {
            .mobile-nav {
                display: block;
            }
            
            .mobile-header {
                display: block;
            }
            
            .nav {
                display: none;
            }
            
            .main {
                margin-left: 0;
                padding-bottom: 80px;
            }
            
            .header {
                display: none;
            }
            
            .hero-banner {
                padding: var(--space-6);
            }
            
            .hero-title {
                font-size: var(--font-size-2xl);
            }
            
            .hero-description {
                font-size: var(--font-size-base);
            }
            
            .hero-actions {
                flex-direction: column;
            }
            
            .hero-btn {
                width: 100%;
                justify-content: center;
            }
            
            .grid-cols-2, .grid-cols-3, .grid-cols-4 {
                grid-template-columns: 1fr;
            }
            
            .chart-header {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-3);
            }
            
            .dictionary-entry {
                grid-template-columns: 1fr;
                gap: var(--space-2);
            }
            
            .dictionary-arrow {
                display: none;
            }
            
            .settings-row {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-3);
            }
            
            .settings-row-action {
                margin-left: 0;
                width: 100%;
            }
            
            .settings-row-action .btn {
                width: 100%;
            }
        }
        
        @media (min-width: 769px) and (max-width: 1024px) {
            .nav {
                width: var(--nav-width-collapsed);
            }
            
            .nav:hover {
                width: var(--nav-width-collapsed);
            }
            
            .nav-logo-text,
            .nav-item-text,
            .nav-section-title,
            .nav-footer-content {
                display: none;
            }
            
            .nav-item {
                justify-content: center;
                padding: var(--space-3);
            }
            
            .nav-item-icon {
                margin: 0;
            }
            
            .nav-logo {
                justify-content: center;
            }
            
            .main {
                margin-left: var(--nav-width-collapsed);
            }
            
            .grid-cols-4 {
                grid-template-columns: repeat(2, 1fr);
            }
        }
</head>

    <script>
        // 页面加载完成后的动画效果
        document.addEventListener('DOMContentLoaded', function() {
            // 入场动画
            const elements = document.querySelectorAll('.card, .stat-card, .hero-banner, .chart-container, .settings-row, .dictionary-entry');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                el.style.transition = `opacity 0.6s ease ${index * 0.05}s, transform 0.6s ease ${index * 0.05}s`;
                
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 100);
            });

            // 进度条动画
            document.querySelectorAll('.progress-bar').forEach(bar => {
                const width = bar.style.width;
                bar.style.width = '0';
                setTimeout(() => {
                    bar.style.width = width;
                }, 500);
            });

            // 导航激活状态
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    navItems.forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                });
            });

            // 开关组件交互
            const toggles = document.querySelectorAll('.toggle');
            toggles.forEach(toggle => {
                toggle.addEventListener('click', function() {
                    this.classList.toggle('active');
                });
            });

            // 主题切换器
            const themeSwitchBtns = document.querySelectorAll('.theme-switch-btn');
            themeSwitchBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    themeSwitchBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    const theme = this.textContent.includes('🌙') ? 'dark' : 
                                  this.textContent.includes('🖥️') ? 'system' : 'light';
                    
                    if (theme === 'dark') {
                        document.body.classList.add('dark-mode');
                        document.body.classList.remove('light-mode');
                    } else if (theme === 'light') {
                        document.body.classList.remove('dark-mode');
                        document.body.classList.add('light-mode');
                    } else {
                        document.body.classList.remove('dark-mode', 'light-mode');
                    }
                });
            });

            // 柱状图动画
            const bars = document.querySelectorAll('.bar');
            bars.forEach((bar, index) => {
                const height = bar.style.height || bar.offsetHeight + 'px';
                bar.style.height = '0';
                setTimeout(() => {
                    bar.style.transition = 'height 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                    bar.style.height = height;
                }, 300 + index * 100);
            });

            // 环形图动画
            const donutCircles = document.querySelectorAll('.donut-chart circle');
            donutCircles.forEach(circle => {
                const dasharray = circle.getAttribute('stroke-dasharray');
                circle.setAttribute('stroke-dasharray', '0 ' + (parseFloat(dasharray.split(' ')[1]) || 100));
                setTimeout(() => {
                    circle.style.transition = 'stroke-dasharray 1s ease-out';
                    circle.setAttribute('stroke-dasharray', dasharray);
                }, 500);
            });

            // 表格行悬停高亮
            const tableRows = document.querySelectorAll('.table tbody tr');
            tableRows.forEach(row => {
                row.addEventListener('mouseenter', function() {
                    this.style.background = 'var(--color-primary-50)';
                });
                row.addEventListener('mouseleave', function() {
                    this.style.background = '';
                });
            });

            // 词典条目悬停效果
            const dictEntries = document.querySelectorAll('.dictionary-entry');
            dictEntries.forEach(entry => {
                entry.addEventListener('mouseenter', function() {
                    this.style.transform = 'translateX(4px)';
                });
                entry.addEventListener('mouseleave', function() {
                    this.style.transform = '';
                });
            });

            // 按钮点击涟漪效果
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    if (this.disabled) return;
                    
                    const rect = this.getBoundingClientRect();
                    const ripple = document.createElement('span');
                    ripple.style.cssText = `
                        position: absolute;
                        width: 10px;
                        height: 10px;
                        background: rgba(255, 255, 255, 0.5);
                        border-radius: 50%;
                        transform: scale(0);
                        animation: ripple 0.6s linear;
                        pointer-events: none;
                    `;
                    
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    ripple.style.left = x + 'px';
                    ripple.style.top = y + 'px';
                    
                    this.style.position = 'relative';
                    this.style.overflow = 'hidden';
                    this.appendChild(ripple);
                    
                    setTimeout(() => ripple.remove(), 600);
                });
            });

            // 添加涟漪动画样式
            const style = document.createElement('style');
            style.textContent = `
                @keyframes ripple {
                    to {
                        transform: scale(20);
                        opacity: 0;
                    }
                }
            `;
            document.head.appendChild(style);

            // 分页按钮交互
            const paginationBtns = document.querySelectorAll('.btn-sm');
            paginationBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    if (this.disabled || this.textContent === '...') return;
                    paginationBtns.forEach(b => {
                        if (b.classList.contains('btn-primary')) {
                            b.classList.remove('btn-primary');
                            b.classList.add('btn-secondary');
                        }
                    });
                    this.classList.remove('btn-secondary');
                    this.classList.add('btn-primary');
                });
            });

            // 键盘导航支持
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Tab') {
                    document.body.classList.add('keyboard-nav');
                }
            });
            
            document.addEventListener('mousedown', function() {
                document.body.classList.remove('keyboard-nav');
            });

            // 快捷键提示
            const focusableElements = 'button:not([disabled]), [href], input, select, textarea, [tabindex]:not([tabindex="-1"])';
            document.querySelectorAll('.settings-row, .dictionary-entry').forEach(el => {
                el.setAttribute('tabindex', '0');
            });
        });
    </script>
